name: Copilot Setup Steps
on: workflow_dispatch

permissions:
  contents: read
  id-token: write

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: copilot
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Install Node dependencies
        run: |
          if [ -f package-lock.json ]; then npm ci; fi
          if [ -f package.json ] && [ ! -f package-lock.json ]; then npm install; fi

      - name: Install Python dependencies
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f pyproject.toml ]; then pip install -e '.[dev]' 2>/dev/null || pip install -e .; fi

      - name: Install Go dependencies
        run: |
          if [ -f go.mod ]; then go mod download; fi

      - name: Install MCP server dependencies
        run: |
          npm install -g @supabase/mcp-server@latest || true
          npm install -g mongodb-mcp-server@latest || true
          npm install -g @vercel/mcp@latest || true
          npm install -g @azure/mcp@latest || true
